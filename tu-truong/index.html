<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thí Nghiệm Từ Trường - Chế Độ Vector Field & La Bàn</title>
    <style>
        :root {
            --primary-red: #ef4444;
            --primary-blue: #3b82f6;
            --bg-white: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.98);
            --text-dark: #1e293b;
            --border: #e2e8f0;
            --accent: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-white);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        #canvas-container {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-white);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 320px;
            z-index: 10;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 800px;
        }

        .controls.collapsed {
            max-height: 70px;
            width: 220px;
        }

        .panel-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 800;
            color: #000;
            margin: 0;
        }

        .collapse-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.4s;
        }

        .collapsed .collapse-btn {
            transform: rotate(180deg);
        }

        .panel-content {
            padding: 24px;
        }

        .collapsed .panel-content {
            display: none;
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #f1f5f9;
            border-radius: 2px;
            appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #000;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .mode-switch {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 10px;
        }

        .mode-btn {
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #64748b;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #fff;
            color: #000;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .legend {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        .red {
            background-color: var(--primary-red);
        }

        .blue {
            background-color: var(--primary-blue);
        }

        .hint {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 15px;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>

<body>
    <!-- Nút Trang chủ cố định -->
    <a href="../index.html" class="btn-home" style="position: fixed; top: 15px; left: 15px; z-index: 999999; display: inline-flex; align-items: center; justify-content: center; background: #ffffff; color: #1e293b; text-decoration: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #cbd5e1; font-family: 'Inter', sans-serif; font-size: 14px; transition: all 0.2s ease;">
        <span style="font-size: 1.2rem; margin-right: 6px;">🏠</span> Trang chủ
    </a>
    <div id="canvas-container">
        <canvas id="fieldCanvas"></canvas>
        <div class="controls" id="controlPanel">
            <div class="panel-header" onclick="togglePanel()">
                <h1>TỪ TRƯỜNG VẬT LÝ</h1>
                <button class="collapse-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="18 15 12 9 6 15"></polyline>
                    </svg>
                </button>
            </div>

            <div class="panel-content">
                <label>Chế độ hiển thị</label>
                <div class="mode-switch">
                    <button id="modeLines" class="mode-btn active" onclick="setMode('lines')">Đường sức</button>
                    <button id="modeGrid" class="mode-btn" onclick="setMode('grid')">Lưới Vector</button>
                </div>

                <div class="control-group">
                    <label for="strengthSlider">Cường độ nam châm</label>
                    <input type="range" id="strengthSlider" min="100" max="800" value="400">
                </div>

                <div id="gridControls" class="control-group" style="display: none;">
                    <label for="densitySlider">Mật độ lưới (Grid)</label>
                    <input type="range" id="densitySlider" min="20" max="60" value="35">
                </div>

                <div class="legend">
                    <div class="legend-item">
                        <div class="dot red"></div><span>Bắc (N)</span>
                    </div>
                    <div class="legend-item">
                        <div class="dot blue"></div><span>Nam (S)</span>
                    </div>
                </div>

                <p class="hint">Kéo thả nam châm hoặc La bàn bất kỳ</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('fieldCanvas');
        const ctx = canvas.getContext('2d');
        const strengthSlider = document.getElementById('strengthSlider');
        const densitySlider = document.getElementById('densitySlider');
        const controlPanel = document.getElementById('controlPanel');
        const gridControls = document.getElementById('gridControls');

        let width, height;
        let magnets = [];
        let compass = { x: 0, y: 0, radius: 25, active: true };
        let displayMode = 'lines'; // 'lines' or 'grid'
        let draggingMagnet = null;
        let draggingCompass = false;

        class Magnet {
            constructor(x, y, angle) {
                this.x = x; this.y = y; this.angle = angle;
                this.length = 160; this.width = 44;
            }

            getNorthPole() {
                return { x: this.x + Math.cos(this.angle) * (this.length / 2), y: this.y + Math.sin(this.angle) * (this.length / 2) };
            }

            getSouthPole() {
                return { x: this.x - Math.cos(this.angle) * (this.length / 2), y: this.y - Math.sin(this.angle) * (this.length / 2) };
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.shadowColor = 'rgba(0,0,0,0.1)'; ctx.shadowBlur = 15; ctx.shadowOffsetY = 5;

                ctx.fillStyle = '#3b82f6'; ctx.fillRect(-this.length / 2, -this.width / 2, this.length / 2, this.width);
                ctx.fillStyle = '#ef4444'; ctx.fillRect(0, -this.width / 2, this.length / 2, this.width);
                ctx.shadowColor = 'transparent';

                ctx.fillStyle = 'white'; ctx.font = 'bold 22px Inter'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('S', -this.length / 4, 0); ctx.fillText('N', this.length / 4, 0);

                ctx.strokeStyle = '#000'; ctx.lineWidth = 1.8; ctx.strokeRect(-this.length / 2, -this.width / 2, this.length, this.width);
                ctx.restore();
            }

            isPointInside(px, py) {
                const dx = px - this.x, dy = py - this.y;
                const lx = dx * Math.cos(-this.angle) - dy * Math.sin(-this.angle);
                const ly = dx * Math.sin(-this.angle) + dy * Math.cos(-this.angle);
                return Math.abs(lx) < this.length / 2 && Math.abs(ly) < this.width / 2;
            }
        }

        function togglePanel() { controlPanel.classList.toggle('collapsed'); }

        function setMode(mode) {
            displayMode = mode;
            document.getElementById('modeLines').classList.toggle('active', mode === 'lines');
            document.getElementById('modeGrid').classList.toggle('active', mode === 'grid');
            gridControls.style.display = (mode === 'grid') ? 'block' : 'none';
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if (compass.x === 0) { compass.x = width - 100; compass.y = height - 100; }
        }

        window.addEventListener('resize', resize);
        resize();

        magnets.push(new Magnet(width / 2 - 200, height / 2, 0));
        magnets.push(new Magnet(width / 2 + 200, height / 2, 0));

        canvas.addEventListener('mousedown', e => {
            const mx = e.clientX, my = e.clientY;
            const distComp = Math.sqrt((mx - compass.x) ** 2 + (my - compass.y) ** 2);
            if (distComp < compass.radius) { draggingCompass = true; return; }
            for (let m of magnets) { if (m.isPointInside(mx, my)) { draggingMagnet = m; break; } }
        });

        window.addEventListener('mousemove', e => {
            if (draggingCompass) { compass.x = e.clientX; compass.y = e.clientY; }
            if (draggingMagnet) { draggingMagnet.x = e.clientX; draggingMagnet.y = e.clientY; }
        });

        window.addEventListener('mouseup', () => { draggingMagnet = null; draggingCompass = false; });

        function getFieldAt(x, y) {
            let fx = 0, fy = 0;
            const s = parseInt(strengthSlider.value);
            magnets.forEach(m => {
                const np = m.getNorthPole(), sp = m.getSouthPole();
                const dnx = x - np.x, dny = y - np.y, distN2 = dnx * dnx + dny * dny + 200;
                fx += (dnx / Math.sqrt(distN2)) * (s * 100 / distN2);
                fy += (dny / Math.sqrt(distN2)) * (s * 100 / distN2);
                const dsx = x - sp.x, dsy = y - sp.y, distS2 = dsx * dsx + dsy * dsy + 200;
                fx -= (dsx / Math.sqrt(distS2)) * (s * 100 / distS2);
                fy -= (dsy / Math.sqrt(distS2)) * (s * 100 / distS2);
            });
            return { x: fx, y: fy };
        }

        function drawCompass() {
            ctx.save();
            ctx.translate(compass.x, compass.y);
            // Outer ring
            ctx.beginPath(); ctx.arc(0, 0, compass.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff'; ctx.fill();
            ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();

            // Pointer
            const f = getFieldAt(compass.x, compass.y);
            const angle = Math.atan2(f.y, f.x);
            ctx.rotate(angle);

            ctx.beginPath(); ctx.moveTo(compass.radius - 5, 0); ctx.lineTo(0, -5); ctx.lineTo(0, 5); ctx.closePath();
            ctx.fillStyle = '#ef4444'; ctx.fill(); // North needle
            ctx.beginPath(); ctx.moveTo(-(compass.radius - 5), 0); ctx.lineTo(0, -5); ctx.lineTo(0, 5); ctx.closePath();
            ctx.fillStyle = '#3b82f6'; ctx.fill(); // South needle
            ctx.restore();
        }

        function drawGrid() {
            const step = parseInt(densitySlider.value);
            for (let x = step / 2; x < width; x += step) {
                for (let y = step / 2; y < height; y += step) {
                    const f = getFieldAt(x, y);
                    const mag = Math.sqrt(f.x * f.x + f.y * f.y);
                    if (mag < 0.001) continue;

                    const angle = Math.atan2(f.y, f.x);
                    const alpha = Math.min(mag * 2, 1);
                    const len = Math.min(step * 0.4, mag * 50);

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(angle);
                    ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
                    ctx.lineWidth = 1.2;
                    ctx.beginPath(); ctx.moveTo(-len / 2, 0); ctx.lineTo(len / 2, 0); ctx.stroke();
                    // Arrow head
                    ctx.beginPath(); ctx.moveTo(len / 2, 0); ctx.lineTo(len / 2 - 4, -3); ctx.lineTo(len / 2 - 4, 3); ctx.closePath();
                    ctx.fillStyle = `rgba(0,0,0,${alpha})`; ctx.fill();
                    ctx.restore();
                }
            }
        }

        function drawLines() {
            const linesPerPole = 14;
            magnets.forEach(m => {
                const np = m.getNorthPole();
                for (let i = 0; i < linesPerPole; i++) {
                    const a = m.angle + (i / linesPerPole) * Math.PI * 2;
                    traceAndRender(np.x + Math.cos(a) * 5, np.y + Math.sin(a) * 5, 1);
                }
                const sp = m.getSouthPole();
                for (let i = 0; i < linesPerPole; i++) {
                    const a = m.angle + (i / linesPerPole) * Math.PI * 2;
                    traceAndRender(sp.x + Math.cos(a) * 5, sp.y + Math.sin(a) * 5, -1);
                }
            });
        }

        function traceAndRender(sx, sy, dir) {
            let cx = sx, cy = sy;
            let path = [{ x: cx, y: cy }];
            for (let s = 0; s < 400; s++) {
                const f = getFieldAt(cx, cy);
                const m = Math.sqrt(f.x * f.x + f.y * f.y);
                if (m < 0.01) break;
                cx += (f.x / m) * 4 * dir; cy += (f.y / m) * 4 * dir;
                path.push({ x: cx, y: cy });
                let stop = false;
                magnets.forEach(mag => {
                    if (Math.sqrt((cx - mag.getNorthPole().x) ** 2 + (cy - mag.getNorthPole().y) ** 2) < 8) stop = true;
                    if (Math.sqrt((cx - mag.getSouthPole().x) ** 2 + (cy - mag.getSouthPole().y) ** 2) < 8) stop = true;
                });
                if (stop || cx < -100 || cx > width + 100 || cy < -100 || cy > height + 100) break;
            }
            if (path.length < 10) return;
            if (dir === -1) path.reverse();

            ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
            ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 1.3;
            for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            ctx.stroke();

            const mid = Math.floor(path.length * 0.45);
            if (mid > 0) {
                const p1 = path[mid - 1], p2 = path[mid];
                const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                ctx.save(); ctx.translate(p2.x, p2.y); ctx.rotate(angle);
                ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(-6, -4); ctx.lineTo(-6, 4); ctx.closePath();
                ctx.fillStyle = '#000'; ctx.fill(); ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            if (displayMode === 'lines') drawLines(); else drawGrid();
            magnets.forEach(m => m.draw());
            drawCompass();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>

</html>
