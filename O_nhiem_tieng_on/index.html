<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thí Nghiệm Ô Nhiễm Tiếng Ồn & Vật Liệu Cách Âm</title>
    <meta name="description"
        content="Mô phỏng tác động của tiếng ồn và hiệu quả của các vật liệu cách âm khác nhau trong xây dựng nhà ở.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <a href="../index.html" class="btn-home">🏠 Quay lại Trang chủ</a>

    <div id="container">
        <canvas id="simCanvas"></canvas>

        <div class="info-panel">
            <h1>🛡️ Thí Nghiệm Cách Âm</h1>
            <p id="description">Chọn một loại vật liệu để kiểm tra hiệu quả ngăn chặn tiếng ồn của lớp tường.</p>
        </div>

        <div class="status-panel">
            <span class="status-label">Âm thanh bên trong</span>
            <span id="noiseLevel" class="status-val">Ồn</span>
        </div>

        <div class="ui-overlay">
            <button class="btn btn-wood active" onclick="setMaterial('wood')">🪵 Gỗ</button>
            <button class="btn btn-cotton" onclick="setMaterial('cotton')">☁️ Bông</button>
            <button class="btn btn-foam" onclick="setMaterial('foam')">🧼 Bông xốp</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const noiseLevelDisplay = document.getElementById('noiseLevel');
        const descriptionDisplay = document.getElementById('description');

        let width, height;
        let material = 'wood';
        let incidentWaves = [];
        let reflectedWaves = [];
        let internalWaves = [];
        let frameCount = 0;

        const config = {
            wood: {
                color: '#A0522D',
                reflectRate: 0.7,
                passRate: 0.4,
                speed: 4,
                status: 'Ồn ào',
                statusColor: '#ff4757',
                emotion: 'angry',
                desc: 'Gỗ phản xạ mạnh nhưng cách âm kém. Sóng âm dồn dập lọt vào nhà khiến người nghe rất khó chịu.'
            },
            cotton: {
                color: '#E0E0E0',
                reflectRate: 0.3,
                passRate: 0.15,
                speed: 3,
                status: 'Dịu nhẹ',
                statusColor: '#ffa502',
                emotion: 'neutral',
                desc: 'Bông hấp thụ tốt. Chỉ một lượng nhỏ âm thanh mờ nhạt lọt vào, không gian trở nên dễ chịu hơn.'
            },
            foam: {
                color: '#747d8c',
                reflectRate: 0.0,
                passRate: 0.0,
                speed: 2.5,
                status: 'Yên tĩnh',
                statusColor: '#2ed573',
                emotion: 'happy',
                desc: 'Bông xốp tiêu âm tuyệt đối. Sóng âm bị triệt tiêu hoàn toàn, người nghe được tận hưởng sự yên bình.'
            }
        };

        function init() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', init);
        init();

        class Wave {
            constructor(x, y, angle = 0, type = 'incident') {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.opacity = 1;
                this.type = type; // incident, reflected, internal
                this.speed = (type === 'internal') ? config[material].speed * 0.8 : config[material].speed;
                this.maxOpacity = type === 'internal' ? 0.4 : 1;
            }

            update() {
                this.radius += this.speed;
                if (this.type === 'internal') {
                    this.opacity -= 0.015;
                } else {
                    this.opacity -= 0.004;
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 71, 87, ${this.opacity * this.maxOpacity})`;

                // Độ dày tăng dần
                ctx.lineWidth = 1.5 + (this.radius / 80) * 2;

                if (this.type === 'incident') {
                    // Cung 60 độ
                    ctx.arc(this.x, this.y, this.radius, -Math.PI / 6, Math.PI / 6);
                } else if (this.type === 'reflected') {
                    // Cung phản xạ
                    ctx.arc(this.x, this.y, this.radius, Math.PI - Math.PI / 6, Math.PI + Math.PI / 6);
                } else {
                    // Cung bên trong
                    ctx.arc(this.x, this.y, this.radius, -Math.PI / 10, Math.PI / 10);
                }

                ctx.stroke();
                ctx.restore();
            }
        }

        function setMaterial(m) {
            material = m;
            incidentWaves = [];
            reflectedWaves = [];
            internalWaves = [];
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.btn-${m}`).classList.add('active');

            descriptionDisplay.innerText = config[m].desc;
            noiseLevelDisplay.innerText = config[m].status;
            noiseLevelDisplay.style.color = config[m].statusColor;
        }

        function drawHouse() {
            // Scale 1.15x (320 * 1.15 = 368, 240 * 1.15 = 276)
            const hWidth = 368;
            const hHeight = 276;
            const hX = width * 0.52;
            const hY = height / 2 - 120;

            // Thân nhà
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(hX, hY, hWidth, hHeight);

            // Tường
            ctx.strokeStyle = config[material].color;
            ctx.lineWidth = 18;
            ctx.strokeRect(hX, hY, hWidth, hHeight);

            // Mái nhà
            ctx.beginPath();
            ctx.strokeStyle = '#5d4037';
            ctx.lineWidth = 14;
            ctx.lineCap = 'round';
            const roofPeakY = hY - 100;
            const roofPeakX = hX + hWidth / 2;
            ctx.moveTo(roofPeakX, roofPeakY);
            ctx.lineTo(hX - 50, hY);
            ctx.moveTo(roofPeakX, roofPeakY);
            ctx.lineTo(hX + hWidth + 50, hY);
            ctx.stroke();

            // Nhân vật (Scale 1.2x thêm từ 1.3 -> ~1.56)
            const charScale = 1.56;
            // Nguồn phát
            drawCharacter(width * 0.12, height / 2 + 120, 'Nguồn phát (Ồn)', 'neutral', charScale, true);
            // Người nghe
            drawCharacter(hX + hWidth / 2, hY + hHeight / 2 + 70, 'Người nghe', config[material].emotion, charScale, false);

            return { wallX: hX, hWidth, hHeight, sourceY: height / 2 };
        }

        function drawCharacter(x, y, label, emotion, scale, isSource) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.fillStyle = '#2f3542';
            ctx.strokeStyle = '#2f3542';
            ctx.lineWidth = 2;

            // Head
            ctx.beginPath();
            ctx.arc(0, -40, 10, 0, Math.PI * 2);
            ctx.fill();

            // Eyes & Mouth (Emotions)
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1.5;
            if (emotion === 'happy') {
                // Smile & Content eyes
                ctx.beginPath(); ctx.arc(0, -38, 5, 0.2, Math.PI - 0.2); ctx.stroke();
                // Closed happy eyes
                ctx.beginPath(); ctx.moveTo(-5, -43); ctx.lineTo(-2, -41); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(5, -43); ctx.lineTo(2, -41); ctx.stroke();
                // Headphones
                ctx.strokeStyle = '#70a1ff';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(0, -40, 12, Math.PI, 0); ctx.stroke();
            } else if (emotion === 'angry') {
                // Angry eyebrows
                ctx.beginPath(); ctx.moveTo(-6, -45); ctx.lineTo(-2, -42); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(6, -45); ctx.lineTo(2, -42); ctx.stroke();
                // Frown
                ctx.beginPath(); ctx.arc(0, -32, 4, Math.PI + 0.5, 2 * Math.PI - 0.5); ctx.stroke();
                // Red face tint
                ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
                ctx.beginPath(); ctx.arc(0, -40, 10, 0, Math.PI * 2); ctx.fill();
            } else {
                // Neutral
                ctx.fillStyle = 'white';
                ctx.fillRect(-4, -43, 2, 2); ctx.fillRect(2, -43, 2, 2);
                ctx.beginPath(); ctx.moveTo(-3, -36); ctx.lineTo(3, -36); ctx.stroke();
            }

            // Body
            ctx.strokeStyle = '#2f3542';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -30); ctx.lineTo(0, -10);
            ctx.moveTo(-12, -25); ctx.lineTo(12, -25);
            ctx.moveTo(0, -10); ctx.lineTo(-8, 5);
            ctx.moveTo(0, -10); ctx.lineTo(8, 5);
            ctx.stroke();

            // Label
            ctx.fillStyle = '#2f3542';
            ctx.font = 'bold 8px var(--font-main)';
            ctx.textAlign = 'center';
            ctx.fillText(label, 0, 22);

            if (isSource) {
                // Speaker icon
                ctx.fillStyle = '#57606f';
                ctx.fillRect(15, -45, 12, 15);
                ctx.beginPath();
                ctx.moveTo(27, -45); ctx.lineTo(35, -53); ctx.lineTo(35, -22); ctx.lineTo(27, -30);
                ctx.fill();
            }
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#B0E0E6';
            ctx.fillRect(0, 0, width, height);

            const house = drawHouse();
            const wallX = house.wallX;
            const sourceX = width * 0.12;
            const sourceY = height / 2;

            // Tăng mật độ: 15 frames (0.25s) thay vì 30 frames
            if (frameCount % 15 === 0) {
                incidentWaves.push(new Wave(sourceX, sourceY, 0, 'incident'));
            }

            // Vẽ sóng tới
            for (let i = incidentWaves.length - 1; i >= 0; i--) {
                let w = incidentWaves[i];
                w.update();
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, sourceY - 200, wallX, 400); // Mask rộng hơn chút cho cân đối
                ctx.clip();
                w.draw();
                ctx.restore();

                if (w.x + w.radius >= wallX) {
                    const cfg = config[material];
                    if (cfg.reflectRate > 0) reflectedWaves.push(new Wave(wallX, sourceY, Math.PI, 'reflected'));
                    if (cfg.passRate > 0) internalWaves.push(new Wave(wallX, sourceY, 0, 'internal'));
                    incidentWaves.splice(i, 1);
                } else if (w.opacity <= 0) {
                    incidentWaves.splice(i, 1);
                }
            }

            // Vẽ sóng phản xạ
            for (let i = reflectedWaves.length - 1; i >= 0; i--) {
                let w = reflectedWaves[i];
                w.update();
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, sourceY - 200, wallX, 400);
                ctx.clip();
                w.maxOpacity = config[material].reflectRate;
                w.draw();
                ctx.restore();
                if (w.opacity <= 0) reflectedWaves.splice(i, 1);
            }

            // Vẽ sóng xuyên thấu
            for (let i = internalWaves.length - 1; i >= 0; i--) {
                let w = internalWaves[i];
                w.update();
                ctx.save();
                ctx.beginPath();
                ctx.rect(wallX, sourceY - 150, house.hWidth, 300);
                ctx.clip();
                w.maxOpacity = config[material].passRate;
                w.draw();
                ctx.restore();
                if (w.opacity <= 0) internalWaves.splice(i, 1);
            }

            frameCount++;
            requestAnimationFrame(animate);
        }

        // Initial material setup
        setMaterial('wood');
        animate();
    </script>
</body>

</html>
