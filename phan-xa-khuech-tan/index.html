<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Thí Nghiệm ẢO: Phản Xạ Ánh Sáng</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Nút Trang chủ cố định -->
    <a href="../index.html" class="btn-home" style="position: fixed; top: 15px; left: 15px; z-index: 999999; display: inline-flex; align-items: center; justify-content: center; background: #ffffff; color: #1e293b; text-decoration: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #cbd5e1; font-family: 'Inter', sans-serif; font-size: 14px; transition: all 0.2s ease;">
        <span style="font-size: 1.2rem; margin-right: 6px;">🏠</span> Trang chủ
    </a>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <h2>Phòng Thí Nghiệm Ảo</h2>
                <p>Định Luật Phản Xạ Ánh Sáng</p>
                <div class="hint-text">Kéo thả vật dụng ra màn hình chính</div>
            </div>

            <div class="control-panel">
                <div class="tool-group">
                    <h3>1. Nhóm Gương</h3>
                    <div class="tools-grid">
                        <div class="tool-item" draggable="true" data-type="mirror-flat" data-tooltip="Gương phẳng">
                            <svg width="60" height="40" viewBox="0 0 60 40">
                                <path d="M5 25 L55 25" stroke="#1e40af" stroke-width="5" stroke-linecap="round" />
                                <path d="M10 25 L5 35 M20 25 L15 35 M30 25 L25 35 M40 25 L35 35 M50 25 L45 35"
                                    stroke="#94a3b8" stroke-width="1.5" />
                            </svg>
                        </div>
                        <div class="tool-item" draggable="true" data-type="mirror-rough" data-tooltip="Gương gồ ghề">
                            <svg width="60" height="40" viewBox="0 0 60 40">
                                <path d="M5 25 L15 15 L25 30 L35 15 L45 25 L55 20" stroke="#1e40af" stroke-width="4"
                                    fill="none" stroke-linejoin="round" stroke-linecap="round" />
                                <path d="M10 20 L5 30 M20 20 L15 30 M30 20 L25 30 M40 20 L35 30 M50 20 L45 30"
                                    stroke="#94a3b8" stroke-width="1.5" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="tool-group">
                    <h3>2. Nhóm Nguồn Sáng</h3>
                    <div class="tools-grid">
                        <div class="tool-item" draggable="true" data-type="ray-single" data-tooltip="1 Tia tới">
                            <svg width="60" height="40" viewBox="0 0 60 40">
                                <rect x="5" y="15" width="20" height="10" fill="#1e293b" rx="2" />
                                <path d="M25 20 L55 20" stroke="#ef4444" stroke-width="3" />
                                <polygon points="45,15 55,20 45,25" fill="#ef4444" />
                            </svg>
                        </div>
                        <div class="tool-item" draggable="true" data-type="ray-parallel" data-tooltip="4 Tia song song">
                            <svg width="60" height="40" viewBox="0 0 60 40">
                                <rect x="5" y="5" width="20" height="30" fill="#1e293b" rx="2" />
                                <path d="M25 10 L55 10" stroke="#ef4444" stroke-width="2" />
                                <polygon points="50,7 55,10 50,13" fill="#ef4444" />
                                <path d="M25 17 L55 17" stroke="#ef4444" stroke-width="2" />
                                <path d="M25 24 L55 24" stroke="#ef4444" stroke-width="2" />
                                <path d="M25 31 L55 31" stroke="#ef4444" stroke-width="2" />
                                <polygon points="50,28 55,31 50,34" fill="#ef4444" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="tool-group">
                    <h3>3. Nhóm Đo Đạc</h3>
                    <div class="tools-grid">
                        <div class="tool-item" draggable="true" data-type="protractor" data-tooltip="Thước đo góc">
                            <svg width="70" height="35" viewBox="0 0 70 35">
                                <path d="M5 30 A 30 30 0 0 1 65 30 Z" fill="rgba(37, 99, 235, 0.1)" stroke="#64748b"
                                    stroke-width="1.5" />
                                <path d="M5 30 L65 30" stroke="#64748b" stroke-width="1.5" />
                                <circle cx="35" cy="30" r="3" fill="#2563eb" />
                                <path d="M35 30 L35 0" stroke="#94a3b8" stroke-dasharray="2 2" stroke-width="1" />
                                <path d="M35 30 L15 10 M35 30 L55 10" stroke="#94a3b8" stroke-dasharray="2 2"
                                    stroke-width="1" />
                            </svg>
                        </div>
                        <div class="tool-item" draggable="true" data-type="magnifier" data-tooltip="Kính lúp">
                            <svg width="40" height="40" viewBox="0 0 40 40">
                                <circle cx="16" cy="16" r="10" stroke="#475569" stroke-width="3" fill="#f8fafc" />
                                <line x1="23" y1="23" x2="35" y2="35" stroke="#1e293b" stroke-width="5"
                                    stroke-linecap="round" />
                            </svg>
                        </div>
                    </div>
                </div>


            </div>

            <figure class="trash-zone" id="trash-zone">
                Kéo vật dụng vào đây để xóa bỏ
            </figure>

            <button class="btn-reset" onclick="resetState()">Đặt lại thí nghiệm</button>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace" id="workspace">
            <canvas id="experimentCanvas"></canvas>
            <div id="drag-overlay" class="drag-overlay">Thả dụng cụ vào màn hình</div>
        </main>
    </div>

    <script src="sketch.js"></script>
</body>

</html>
