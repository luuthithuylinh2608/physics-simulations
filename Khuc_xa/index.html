<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thí Nghiệm Khúc Xạ & Phản Xạ Ánh Sáng</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>

<body>
    <a href="../index.html" class="btn-home">🏠 Quay lại Trang chủ</a>
    <div id="app">
        <!-- Bảng điều khiển (Trộn) -->
        <aside class="panel">
            <h2>⚙️ Điều khiển</h2>

            <div class="control-group">
                <label>Góc tới: <span id="angle-val">45</span>°</label>
                <input type="range" id="angle-slider" min="0" max="80" value="45">
            </div>

            <div class="control-group">
                <label>Chiết suất n1: <span id="n1-val">1.00</span></label>
                <input type="range" id="n1-slider" min="1" max="2.5" step="0.01" value="1.00">
            </div>

            <div class="control-group">
                <label>Chiết suất n2: <span id="n2-val">1.33</span></label>
                <input type="range" id="n2-slider" min="1" max="2.5" step="0.01" value="1.33">
            </div>

            <div class="control-group">
                <label>Cường độ: <span id="intensity-val">100</span>%</label>
                <input type="range" id="intensity-slider" min="10" max="100" value="100">
            </div>

            <div class="toggle-group">
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-normal" checked> Pháp tuyến
                </label>
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-angles" checked> Hiện góc đo
                </label>
                <label class="toggle-item">
                    <input type="checkbox" id="toggle-rough"> Bề mặt gồ ghề
                </label>
            </div>

            <button class="action-btn secondary" id="reset-btn">🔄 Reset</button>
        </aside>

        <!-- Vùng thí nghiệm chính -->
        <main class="experiment-container" id="canvas-container">
            <div class="overlay-controls">
                <button class="action-btn" id="compare-btn">🔄 So sánh vật liệu</button>
                <button class="action-btn" id="predict-btn">❓ Chế độ dự đoán</button>
            </div>

            <div id="prediction-overlay">
                <div class="prediction-card">
                    <h3>Dự đoán kết quả</h3>
                    <p id="prediction-question">Tia sáng sẽ lệch như thế nào khi đi từ n1 sang n2?</p>
                    <div class="prediction-opts">
                        <button class="opt-btn" data-choice="closer">Lệch lại gần pháp tuyến</button>
                        <button class="opt-btn" data-choice="further">Lệch ra xa pháp tuyến</button>
                        <button class="opt-btn" data-choice="straight">Truyền thẳng</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bảng chọn vật liệu -->
        <aside class="panel">
            <h2>💎 Vật liệu (n2)</h2>
            <div class="material-grid">
                <button class="mat-btn" data-n="mirror" id="mirror">
                    <img src="mirror_icon.png" alt="Mirror" width="30">
                    Gương
                </button>
                <button class="mat-btn active" data-n="1.33" id="water">
                    <img src="water_drop_icon.png" alt="Water" width="30">
                    Nước
                </button>
                <button class="mat-btn" data-n="1.50" id="glass">
                    <img src="glass_cube_icon.png" alt="Glass" width="30">
                    Kính
                </button>
                <button class="mat-btn" data-n="1.70" id="stone">
                    <img src="stone_rock_icon.png" alt="Stone" width="30">
                    Đá
                </button>
                <button class="mat-btn" data-n="1.80" id="wall" style="grid-column: span 2;">
                    <img src="wall_brick_icon.png" alt="Wall" width="30">
                    Bức tường (Cực đậm)
                </button>
            </div>

            <div style="margin-top: auto; font-size: 0.8rem; color: #666; line-height: 1.4;">
                <p><b>Định luật Snell:</b><br>n₁sin(i) = n₂sin(r)</p>
                <p style="margin-top: 5px;"><b>Phản xạ toàn phần:</b><br>Xảy ra khi n₁ > n₂ và i > i<sub>gh</sub></p>
            </div>
        </aside>
    </div>

    <script src="sketch.js"></script>
</body>

</html>
